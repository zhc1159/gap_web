    <script>
      var t = localStorage.getItem('gap-theme');

    <style>
      body { background: #f8fafc; }
      [data-theme="cyber-neon"] body { background: #0a0a14; }
      [data-theme="deep-ocean"] body { background: #000a14; }
    </style>

    <script type="module" src="/src/main.ts"></script>
